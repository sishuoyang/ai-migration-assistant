server {
    listen 80;

    # SPA: any path that doesn't match a file falls back to index.html.
    # (Phase 2 has no client-side router so this is rarely hit, but
    # future phases add routes.)
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
