server {
    listen 80;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    ssl_certificate     /etc/nginx/ssl/self.crt;
    ssl_certificate_key /etc/nginx/ssl/self.key;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Increase timeouts for long-running AI responses
    proxy_read_timeout  300s;
    proxy_send_timeout  300s;

    # ── migrationkit API → migration-runner:8001 ────────────────────
    # Strip the /api/mk prefix; underlying app serves /api/...
    # SSE-friendly: HTTP/1.1, no proxy buffering, no chunked encoding.
    location /api/mk/ {
        rewrite ^/api/mk/(.*)$ /api/$1 break;
        proxy_pass         http://migration-runner:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_buffering    off;
        proxy_cache        off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
    }

    # ── migration-dashboard SPA ─────────────────────────────────────
    location /dashboard/ {
        rewrite ^/dashboard/(.*)$ /$1 break;
        proxy_pass         http://migration-dashboard:80;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-Proto https;
    }
    # Bare /dashboard (no trailing slash) → redirect.
    location = /dashboard {
        return 301 /dashboard/;
    }

    # ── LibreChat (default) ─────────────────────────────────────────
    location / {
        proxy_pass         http://librechat:3080;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
    }
}
