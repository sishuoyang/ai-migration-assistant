# No top-level "version" key — deprecated in Docker Compose v2 (Compose spec)

services:
  # ── Source Database ──────────────────────────────────────────
  postgres:
    build: ./sources/postgres/docker
    environment:
      POSTGRES_DB: ecommerce
      POSTGRES_USER: playground
      POSTGRES_PASSWORD: playground
      DATASET_SIZE: ${DATASET_SIZE:-medium}
    ports:
      - "5432:5432"
    volumes:
      - ./sources/postgres/docker/init-data:/docker-entrypoint-initdb.d
      - ./sources/postgres/docker/pg-config/postgresql.conf:/etc/postgresql/postgresql.conf
      - pg-data:/var/lib/postgresql/data
    command: ["postgres", "-c", "config_file=/etc/postgresql/postgresql.conf"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U playground -d ecommerce"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - playground-net

  # ── ClickHouse OSS (Source Database) ────────────────────────
  clickhouse-oss:
    image: clickhouse/clickhouse-server:latest
    ports:
      - "8123:8123"   # HTTP interface
      - "9000:9000"   # Native protocol
    volumes:
      - ./sources/clickhouse-oss/docker/init-data:/docker-entrypoint-initdb.d
      - ./sources/clickhouse-oss/docker/users.d/playground-network.xml:/etc/clickhouse-server/users.d/playground-network.xml
      - ch-oss-data:/var/lib/clickhouse
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8123/ping"]
      interval: 5s
      timeout: 5s
      retries: 20
    networks:
      - playground-net

  # ── ClickHouse OSS MCP Server ────────────────────────────────
  # mcp-clickhouse Python package served over SSE transport
  clickhouse-oss-mcp:
    build: ./sources/clickhouse-oss/docker/mcp
    environment:
      CLICKHOUSE_HOST: clickhouse-oss
      CLICKHOUSE_PORT: "8123"
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
      CLICKHOUSE_DATABASE: analytics
      CLICKHOUSE_SECURE: "false"
      CLICKHOUSE_ALLOW_WRITE_ACCESS: "true"
      CLICKHOUSE_MCP_SERVER_TRANSPORT: sse
      CLICKHOUSE_MCP_BIND_HOST: "0.0.0.0"
      CLICKHOUSE_MCP_BIND_PORT: "8000"
      CLICKHOUSE_MCP_AUTH_DISABLED: "true"
    ports:
      - "8002:8000"
    depends_on:
      clickhouse-oss:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; r=urllib.request.urlopen('http://localhost:8000/sse', timeout=2); sys.exit(0 if r.status == 200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - playground-net

  # ── Postgres MCP Server ──────────────────────────────────────
  postgres-mcp:
    image: crystaldba/postgres-mcp
    environment:
      DATABASE_URI: "postgresql://playground:playground@postgres:5432/ecommerce"
    command: ["--access-mode=unrestricted", "--transport=sse"]
    ports:
      - "8001:8000"
    depends_on:
      postgres:
        condition: service_healthy
    # Probe /sse via Python stdlib (image is a Python MCP server; no
    # curl/wget). A 200 from /sse means the SSE transport is up and
    # ready to accept LibreChat's MCP handshake.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; r=urllib.request.urlopen('http://localhost:8000/sse', timeout=2); sys.exit(0 if r.status == 200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - playground-net


  # ── ClickHouse Cloud Write MCP Server ───────────────────────
  # mcp-clickhouse + clickhouse-client CLI pointed at ClickHouse Cloud.
  # Provides write access (DDL + INSERT) that the managed mcp.clickhouse.cloud
  # server does not support. Credentials come from .env.
  clickhousectl-mcp:
    build: ./docker/clickhousectl-mcp
    environment:
      CLICKHOUSE_HOST: ${CLICKHOUSE_CLOUD_HOST:-}
      CLICKHOUSE_PORT: "8443"
      CLICKHOUSE_USER: ${CLICKHOUSE_CLOUD_USER:-default}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_CLOUD_PASSWORD:-}
      CLICKHOUSE_DATABASE: ${CLICKHOUSE_CLOUD_DATABASE:-default}
      CLICKHOUSE_SECURE: "true"
      CLICKHOUSE_VERIFY: "false"
      CLICKHOUSE_ALLOW_WRITE_ACCESS: "true"
      CLICKHOUSE_MCP_SERVER_TRANSPORT: sse
      CLICKHOUSE_MCP_BIND_HOST: "0.0.0.0"
      CLICKHOUSE_MCP_BIND_PORT: "8000"
      CLICKHOUSE_MCP_AUTH_DISABLED: "true"
    ports:
      - "8003:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; r=urllib.request.urlopen('http://localhost:8000/sse', timeout=2); sys.exit(0 if r.status == 200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 20
      # Slightly longer grace because this connects to ClickHouse Cloud
      # over the public internet at boot — TLS + auth round-trip can
      # take a few seconds.
      start_period: 15s
    networks:
      - playground-net

  # ── Snowflake Source MCP ────────────────────────────────────
  # Read-only Snowflake-Labs/mcp wrapper. Profile-gated because the upstream
  # server connects to Snowflake at startup and crashes if credentials are
  # missing or invalid. Partners using the Snowflake source set SNOWFLAKE_*
  # in .env then run `make up-snowflake` (or `docker compose --profile
  # snowflake up -d`).
  snowflake-source:
    profiles: ["snowflake"]
    build: ./docker/snowflake-mcp
    environment:
      SNOWFLAKE_ACCOUNT: ${SNOWFLAKE_ACCOUNT:-}
      SNOWFLAKE_USER: ${SNOWFLAKE_USER:-}
      SNOWFLAKE_PASSWORD: ${SNOWFLAKE_PASSWORD:-}
      SNOWFLAKE_WAREHOUSE: ${SNOWFLAKE_WAREHOUSE:-COMPUTE_WH}
      SNOWFLAKE_ROLE: ${SNOWFLAKE_ROLE:-}
    ports:
      - "8004:8000"
    # Probe the /sse endpoint using Python stdlib — the image is Python
    # already and has no curl/wget. A 200 from /sse means the MCP server
    # is accepting connections; partner shim won't try to open its
    # upstream session until this passes.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/sse', timeout=2).status == 200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - playground-net

  # ── Gemini Compatibility Shim ───────────────────────────────────
  # Proxies snowflake-source and strips JSON Schema fields that Google
  # Gemini's function-calling API rejects (exclusiveMaximum, $schema,
  # const, oneOf, allOf, etc.). LibreChat connects to this shim instead
  # of snowflake-source directly. Profile-gated alongside snowflake-source.
  snowflake-source-shim:
    profiles: ["snowflake"]
    build: ./docker/mcp-gemini-shim
    environment:
      UPSTREAM_MCP_URL: "http://snowflake-source:8000/sse"
      SHIM_NAME: "snowflake-source"
    ports:
      - "8014:8000"
    # Wait for the upstream to be HEALTHY (not just started) before
    # booting — the shim opens its upstream SSE session in `lifespan`
    # at startup and used to crash if upstream wasn't ready yet.
    # Combined with the in-process retry-with-backoff in server.py,
    # this gives both first-boot ordering AND mid-run resilience.
    depends_on:
      snowflake-source:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; r=urllib.request.urlopen('http://localhost:8000/sse', timeout=2); sys.exit(0 if r.status == 200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 20
      # Generous grace: shim opens its upstream SSE session at boot;
      # in the retry-with-backoff worst case it waits ~60s for the
      # upstream to come up.
      start_period: 75s
    networks:
      - playground-net

  # ── BigQuery Source MCP ─────────────────────────────────────
  # Official googleapis/mcp-toolbox image with the --prebuilt bigquery
  # toolset (10 tools: list datasets/tables, get table info, execute SQL,
  # forecast, contribution analysis, catalog search, …). writeMode is
  # blocked at the toolset config so the agent can't accidentally mutate
  # the source. Profile-gated because the toolbox crashes at startup if
  # BIGQUERY_PROJECT or the SA key are missing.
  bigquery-source:
    profiles: ["bigquery"]
    image: us-central1-docker.pkg.dev/database-toolbox/toolbox/toolbox:1.2.0
    # ENTRYPOINT on the image is already `["/toolbox"]`, so `command:`
    # entries become its args. Earlier versions of this file led with
    # "toolbox" — that worked when the entrypoint was a shell — but
    # 1.2.0 trips on it with `unknown command "toolbox" for "toolbox"`.
    # `--ui` was also removed in 1.2.x.
    command:
      - "--prebuilt=bigquery"
      - "--address=0.0.0.0"
      - "--port=8000"
    environment:
      BIGQUERY_PROJECT: ${BIGQUERY_PROJECT:-}
      BIGQUERY_LOCATION: ${BIGQUERY_LOCATION:-US}
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp-key.json
    volumes:
      - ${BIGQUERY_KEY_FILE:-./secrets/gcp-key.json}:/secrets/gcp-key.json:ro
    ports:
      - "8007:8000"
    # No explicit healthcheck — the toolbox 1.2.0 image is a scratch
    # build containing only `/toolbox`, so `wget` / `curl` / `nc` /
    # `/bin/sh` are all unavailable for in-container probing. The
    # container is genuinely ready ~1 s after start (logs print
    # "Server ready to serve!"); LibreChat's depends_on for this
    # service uses `required: false`, so no other startup blocks on
    # its health.
    networks:
      - playground-net

  # ── Migration Runner ────────────────────────────────────────
  # Executes Python migration scripts in-chat (via run_python MCP tool)
  # so the agent can drive end-to-end migrations without asking the
  # partner to copy code into a local editor.
  migration-runner:
    build: ./docker/migration-runner
    env_file: .env
    environment:
      MIGRATIONKIT_API_PORT: "8001"
      MIGRATIONKIT_SOURCES_DIR: "/sources"
      # CH_OSS_HOST / POSTGRES_HOST: NOT overridden here. The Python
      # connector defaults to the Docker service name when the env var
      # is unset (see migrationkit/sources/{clickhouse_oss,postgres}.py).
      # Partners using their own external DBs set these to their real
      # hostnames in .env and that wins. Setting them to "localhost" in
      # .env never works in-container — that's a .env trap, not a
      # docker-compose issue.
      #
      # GOOGLE_APPLICATION_CREDENTIALS points at the SA key mounted
      # below — google-cloud-bigquery picks this up automatically when
      # the BigQuery agent is in play. Setting it unconditionally is
      # safe: only the BigQuery agent ever tries to authenticate, and
      # missing the file only matters for that agent.
      GOOGLE_APPLICATION_CREDENTIALS: /secrets/gcp-key.json
      # Override the host-relative `./secrets/gcp-key.json` that .env
      # carries — inside the container the bind mount lands the key
      # at /secrets/gcp-key.json. Without these overrides, anything
      # reading BIGQUERY_KEY_FILE / STAGING_GCS_KEY_FILE (e.g.
      # GCSStage.from_env()) trips on a relative path that doesn't
      # resolve against /workspace.
      BIGQUERY_KEY_FILE: /secrets/gcp-key.json
      STAGING_GCS_KEY_FILE: /secrets/gcp-key.json
    volumes:
      - migration-workspace:/workspace
      # Read-only mount so the migrationkit API can serve each source's
      # sample_olap_queries.sql to the dashboard.
      - ./sources:/sources:ro
      # BigQuery SA key — same path as bigquery-source above so Python
      # scripts can authenticate. Default path is gitignored.
      - ${BIGQUERY_KEY_FILE:-./secrets/gcp-key.json}:/secrets/gcp-key.json:ro
    ports:
      - "8005:8000"   # MCP (SSE)
      - "8006:8001"   # migrationkit HTTP API
    # Healthcheck targets the FastAPI /api/health on port 8001 (cheaper
    # than probing /sse on the MCP port; both come up in the same
    # process so either signals readiness). Lets LibreChat and the
    # dashboard wait until the migrationkit API + MCP server are
    # actually serving before depending on them.
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request, sys; r=urllib.request.urlopen('http://localhost:8001/api/health', timeout=2); sys.exit(0 if r.status == 200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 10s
    networks:
      - playground-net

  # ── MongoDB (LibreChat dependency) ───────────────────────────
  mongodb:
    image: mongo:7
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - playground-net

  # ── LibreChat (Chat UI) ──────────────────────────────────────
  librechat:
    image: ghcr.io/danny-avila/librechat:v0.8.5
    ports:
      - "3080:3080"
    env_file:
      - .env
    environment:
      MONGO_URI: "mongodb://mongodb:27017/LibreChat"
      HOST: "0.0.0.0"
      NODE_ENV: production
      ALLOW_REGISTRATION: "true"
    volumes:
      - ./librechat/librechat.yaml:/app/librechat.yaml
    # Wait for every MCP server to be HEALTHY (not just started) before
    # LibreChat boots. Otherwise LibreChat opens MCP SSE sessions to
    # half-ready servers and surfaces "MCP error 0" / "Failed to fetch
    # tools" — the partner sees the agent missing all of its tools
    # without any indication of why. The healthcheck-gated wait also
    # makes the failure mode an obvious "still waiting on X" in
    # `docker compose ps` instead of a silent runtime bug.
    #
    # snowflake-source / snowflake-source-shim are profile-gated to
    # `snowflake`; Compose silently skips depends_on entries for services
    # excluded by the active profile set, so leaving them here is safe.
    depends_on:
      mongodb:
        condition: service_healthy
      postgres-mcp:
        condition: service_healthy
      clickhouse-oss-mcp:
        condition: service_healthy
      clickhousectl-mcp:
        condition: service_healthy
      migration-runner:
        condition: service_healthy
      snowflake-source-shim:
        condition: service_healthy
        required: false
      bigquery-source:
        # service_started (not service_healthy) — the toolbox 1.2.0
        # image has no shell-utility binaries, so it can't host an
        # in-container healthcheck. It logs "Server ready to serve!"
        # within ~1 s of starting, so "started" is the strongest
        # check we can express.
        condition: service_started
        required: false
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks:
      - playground-net

  # ── LibreChat Init — registers user and pre-builds per-source agents ───
  # Built from docker/librechat-init (mongo:7 + curl + jq) so the script can
  # both call the LibreChat API and patch MongoDB directly. Three v0.8.5
  # quirks force the direct-Mongo path (see CLAUDE.md):
  #   1. /api/* requires a browser-ish User-Agent (uaParser middleware)
  #   2. agent-create Zod schema silently strips `mcpServerNames`
  #   3. GET /api/agents returns empty (project-ownership filter)
  librechat-init:
    build: ./docker/librechat-init
    restart: "no"
    env_file: .env
    environment:
      MONGO_URI: "mongodb://mongodb:27017/LibreChat"
      LIBRECHAT_URL: "http://librechat:3080"
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        set -eo pipefail
        UA='Mozilla/5.0 (X11; Linux x86_64) AppleWebKit/537.36 LibreChatInit/1.0'

        # ── 1. Register playground user ──────────────────────────────────
        if curl -sf -o /dev/null -X POST "$$LIBRECHAT_URL/api/auth/register" \
            -H 'Content-Type: application/json' \
            -H "User-Agent: $$UA" \
            -d '{"name":"Playground User","email":"admin@playground.local","username":"playground","password":"playground","confirm_password":"playground"}'; then
          echo "✅ User registered: admin@playground.local / playground"
        else
          echo "ℹ️  User already exists — skipping"
        fi

        # ── 2. Login to obtain JWT (required for /api/agents) ────────────
        LOGIN_RESP=$$(curl -sf -X POST "$$LIBRECHAT_URL/api/auth/login" \
          -H 'Content-Type: application/json' \
          -H "User-Agent: $$UA" \
          -d '{"email":"admin@playground.local","password":"playground"}') || {
            echo "❌ Login request failed"; exit 1;
          }
        TOKEN=$$(echo "$$LOGIN_RESP" | jq -r '.token // empty')
        if [ -z "$$TOKEN" ]; then
          echo "❌ No JWT in login response: $$LOGIN_RESP"
          exit 1
        fi

        # ── 3. Provider/model resolution ─────────────────────────────────
        # Priority: per-source override → global default → auto-detect.
        default_provider() {
          if   [ -n "$${ANTHROPIC_API_KEY:-}" ]; then echo anthropic
          elif [ -n "$${OPENAI_API_KEY:-}" ];    then echo openAI
          elif [ -n "$${GOOGLE_KEY:-}" ];        then echo google
          elif [ -n "$${BEDROCK_AWS_ACCESS_KEY_ID:-}" ]; then echo bedrock
          else echo anthropic
          fi
        }
        default_model() {
          case "$$1" in
            anthropic) echo claude-sonnet-4-6 ;;
            openAI)    echo gpt-4o ;;
            google)    echo gemini-2.0-flash ;;
            bedrock)   echo anthropic.claude-3-5-sonnet-20241022 ;;
            *)         echo claude-sonnet-4-6 ;;
          esac
        }

        # ── 4. Per-source agent bootstrap loop ───────────────────────────
        # Each tuple: source_id | Agent Display Name | ENV_SUFFIX
        agents=(
          "postgres|Postgres → ClickHouse Cloud|POSTGRES"
          "snowflake|Snowflake → ClickHouse Cloud|SNOWFLAKE"
          "bigquery|BigQuery → ClickHouse Cloud|BIGQUERY"
          "clickhouse-oss|ClickHouse OSS → ClickHouse Cloud|CLICKHOUSE_OSS"
        )
        SHARED_MCPS=(clickhousectl clickhouse-docs migration-runner)

        for entry in "$${agents[@]}"; do
          IFS='|' read -r src_id agent_name env_suffix <<< "$$entry"
          per_p="AGENT_PROVIDER_$${env_suffix}"
          per_m="AGENT_MODEL_$${env_suffix}"
          provider="$${!per_p:-$${AGENT_PROVIDER:-$$(default_provider)}}"
          model="$${!per_m:-$${AGENT_MODEL:-$$(default_model "$$provider")}}"

          mcp_json="[\"$${src_id}-source\",\"clickhousectl\",\"clickhouse-docs\",\"migration-runner\"]"
          # `tools` array is what actually loads MCP tools AND triggers
          # serverInstructions injection at chat time. `mcpServerNames`
          # alone is just UI metadata in v0.8.5. The `sys__all__sys_mcp_<X>`
          # marker tells handleTools.js to load all of server X's tools.
          tools_json="[\"sys__all__sys_mcp_$${src_id}-source\",\"sys__all__sys_mcp_clickhousectl\",\"sys__all__sys_mcp_clickhouse-docs\",\"sys__all__sys_mcp_migration-runner\"]"

          configured=$$(mongosh "$$MONGO_URI" --quiet --eval "db.agents.countDocuments({name: '$$agent_name', mcpServerNames: { \$$all: $$mcp_json }, tools: { \$$all: $$tools_json } })")
          if [ "$$configured" -ge 1 ]; then
            echo "ℹ️  '$$agent_name' already configured — skipping"
            continue
          fi

          # Remove any half-configured row before creating fresh.
          mongosh "$$MONGO_URI" --quiet --eval "db.agents.deleteMany({ name: '$$agent_name' })" > /dev/null

          http=$$(curl -s -o /tmp/agent.json -w "%{http_code}" -X POST "$$LIBRECHAT_URL/api/agents" \
            -H 'Content-Type: application/json' \
            -H "User-Agent: $$UA" \
            -H "Authorization: Bearer $$TOKEN" \
            -d "{\"name\":\"$$agent_name\",\"provider\":\"$$provider\",\"model\":\"$$model\"}")
          if [ "$$http" != "200" ] && [ "$$http" != "201" ]; then
            echo "❌ Create failed for '$$agent_name' (HTTP $$http):"
            cat /tmp/agent.json
            exit 1
          fi

          mongosh "$$MONGO_URI" --quiet --eval "db.agents.updateOne({ name: '$$agent_name' }, { \$$set: { mcpServerNames: $$mcp_json, tools: $$tools_json } })" > /dev/null
          echo "✅ Created '$$agent_name' ($$provider / $$model)"
        done

        echo "✅ Init complete: $${#agents[@]} agents ensured"
    depends_on:
      librechat:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    networks:
      - playground-net

  # ── HTTPS Reverse Proxy ─────────────────────────────────────
  # Terminates TLS so browsers treat the origin as secure.
  # Required for the Web Crypto API (crypto.subtle) used by LibreChat
  # artifacts (Sandpack) — crypto.subtle is only available in HTTPS contexts.
  # ── migration-dashboard (read-only progress UI, Phase 2) ─────
  # Static React SPA served by an in-container nginx. The main playground
  # nginx fronts this at https://localhost/dashboard/ alongside LibreChat
  # at /. Talks to the migrationkit API at /api/mk/ (also proxied by
  # main nginx) to read run state and stream events via SSE.
  migration-dashboard:
    build: ./docker/migration-dashboard
    networks:
      - playground-net

  nginx:
    build: ./docker/nginx
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      librechat:
        condition: service_healthy
      migration-dashboard:
        condition: service_started
      migration-runner:
        condition: service_started
    networks:
      - playground-net

volumes:
  pg-data:
  ch-oss-data:
  mongo-data:
  migration-workspace:

networks:
  playground-net:
    driver: bridge
